<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · SOCKS Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff; padding: 36px; border-radius: 14px; border: 1px solid #e5e7eb;
      box-shadow: 0 8px 28px rgba(15,23,42,.08); width: 360px; max-width: 100%; color: #1f2937;
    }
    h1 { font-size: 18px; margin-bottom: 4px; text-align: center; color: #2563eb; }
    .sub { color: #6b7280; font-size: 13px; text-align: center; margin-bottom: 22px; }
    label { display: block; font-size: 13px; color: #6b7280; margin: 14px 0 6px; }
    input {
      width: 100%; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 14px; outline: none; background: #fff; color: #1f2937;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    button {
      width: 100%; margin-top: 22px; padding: 12px; border: none; border-radius: 8px;
      background: #16a34a; color: #fff; font-size: 15px; cursor: pointer;
    }
    button:hover { background: #15803d; }
    .err { color: #dc2626; font-size: 13px; margin-top: 14px; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/panel/login">
    <h1>SOCKS Agent</h1>
    <div class="sub">类 3X-UI 节点面板 · 仅 SOCKS5</div>
    <label>用户名</label>
    <input name="username" autocomplete="username" autofocus>
    <label>密码</label>
    <input name="password" type="password" autocomplete="current-password">
    <button type="submit">登 录</button>
    <div class="err">{{ error }}</div>
  </form>
</body>
</html>

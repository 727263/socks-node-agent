<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · SOCKS Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; padding: 40px; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25); width: 360px; max-width: 90vw;
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 4px; text-align: center; }
    .sub { color: #999; font-size: 13px; text-align: center; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #555; margin: 14px 0 6px; }
    input {
      width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none; transition: border .2s;
    }
    input:focus { border-color: #667eea; }
    button {
      width: 100%; margin-top: 22px; padding: 12px; border: none; border-radius: 8px;
      background: #667eea; color: #fff; font-size: 15px; cursor: pointer; transition: background .2s;
    }
    button:hover { background: #5568d3; }
    .err { color: #e53e3e; font-size: 13px; margin-top: 14px; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/panel/login">
    <h1>SOCKS 节点面板</h1>
    <div class="sub">Node Agent Panel</div>
    <label>用户名</label>
    <input name="username" autocomplete="username" autofocus>
    <label>密码</label>
    <input name="password" type="password" autocomplete="current-password">
    <button type="submit">登 录</button>
    <div class="err">{{ error }}</div>
  </form>
</body>
</html>
